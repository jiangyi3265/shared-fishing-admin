name: Deploy Admin Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-admin-web
  cancel-in-progress: true

env:
  DEPLOY_DIR: /www/wwwroot/ht.diaoyuus.cn
  PACKAGE_NAME: admin-dist.tar.gz

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:prod

      - name: Package artifact
        run: |
          set -euo pipefail
          tar -czf "${PACKAGE_NAME}" -C dist .
          ls -lh "${PACKAGE_NAME}"

      - name: Install SSH helper
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Upload and deploy
        timeout-minutes: 10
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ADMIN_HEALTH_URL: ${{ secrets.ADMIN_HEALTH_URL }}
          EXTRA_REQUIRED_SERVICES: ${{ secrets.EXTRA_REQUIRED_SERVICES }}
        run: |
          set -euo pipefail

          : "${SSH_HOST:?Missing SSH_HOST secret}"
          : "${SSH_USER:?Missing SSH_USER secret}"
          SSH_PORT="${SSH_PORT:-22}"

          if [ -z "${SSH_PRIVATE_KEY:-}" ] && [ -z "${SSH_PASSWORD:-}" ]; then
            echo "Set either SSH_PRIVATE_KEY or SSH_PASSWORD in GitHub Actions secrets."
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh_cmd=(ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -p "${SSH_PORT}")
          scp_cmd=(scp -o StrictHostKeyChecking=no -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -P "${SSH_PORT}")

          if [ -n "${SSH_PRIVATE_KEY:-}" ]; then
            printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            ssh_cmd+=(-i ~/.ssh/deploy_key)
            scp_cmd+=(-i ~/.ssh/deploy_key)
          fi

          remote="${SSH_USER}@${SSH_HOST}"

          remote_ssh() {
            if [ -n "${SSH_PRIVATE_KEY:-}" ]; then
              "${ssh_cmd[@]}" "${remote}" "$@"
            else
              sshpass -p "${SSH_PASSWORD}" "${ssh_cmd[@]}" "${remote}" "$@"
            fi
          }

          remote_scp() {
            if [ -n "${SSH_PRIVATE_KEY:-}" ]; then
              "${scp_cmd[@]}" "$1" "${remote}:$2"
            else
              sshpass -p "${SSH_PASSWORD}" "${scp_cmd[@]}" "$1" "${remote}:$2"
            fi
          }

          remote_ssh "mkdir -p '${DEPLOY_DIR}'"
          remote_scp "${PACKAGE_NAME}" "${DEPLOY_DIR}/${PACKAGE_NAME}"
          printf '%s' "${EXTRA_REQUIRED_SERVICES:-}" > .extra_required_services
          remote_scp .extra_required_services "${DEPLOY_DIR}/.extra_required_services"

          remote_ssh "bash -s" -- "${DEPLOY_DIR}" "${PACKAGE_NAME}" <<'EOF'
          set -euo pipefail

          DEPLOY_DIR="$1"
          PACKAGE_NAME="$2"
          TMP_DIR="$(mktemp -d)"
          EXTRA_REQUIRED_SERVICES="$(cat "${DEPLOY_DIR}/.extra_required_services" 2>/dev/null || true)"

          cleanup() {
            rm -rf "${TMP_DIR}"
          }
          trap cleanup EXIT

          mkdir -p "${DEPLOY_DIR}"
          tar -xzf "${DEPLOY_DIR}/${PACKAGE_NAME}" -C "${TMP_DIR}"
          cp -a "${TMP_DIR}/." "${DEPLOY_DIR}/"
          rm -f "${DEPLOY_DIR}/${PACKAGE_NAME}" "${DEPLOY_DIR}/.extra_required_services"

          run_systemctl() {
            if [ "$(id -u)" -eq 0 ]; then
              systemctl "$@"
            else
              sudo -n systemctl "$@"
            fi
          }

          run_privileged() {
            if [ "$(id -u)" -eq 0 ]; then
              "$@"
            else
              sudo -n "$@"
            fi
          }

          unit_exists() {
            local svc="$1"
            systemctl list-unit-files "${svc}.service" --no-legend 2>/dev/null | grep -q "${svc}.service" \
              || systemctl status "${svc}.service" >/dev/null 2>&1
          }

          assert_unit_active() {
            local svc="$1"
            run_systemctl is-active --quiet "${svc}.service"
            echo "Service ${svc}.service is active."
          }

          if command -v nginx >/dev/null 2>&1; then
            run_privileged nginx -t
          else
            echo "Warning: nginx command was not found on the server."
          fi

          if command -v systemctl >/dev/null 2>&1; then
            if unit_exists nginx; then
              assert_unit_active nginx
              run_systemctl reload nginx
              echo "Nginx reloaded."
            else
              echo "Warning: nginx.service was not found."
            fi

            for svc in ${EXTRA_REQUIRED_SERVICES:-}; do
              assert_unit_active "${svc}"
            done
          else
            echo "systemctl is not available; skipped system service checks."
          fi

          echo "Admin web deployed to ${DEPLOY_DIR}."
          EOF

      - name: Verify public admin site
        env:
          ADMIN_HEALTH_URL: ${{ secrets.ADMIN_HEALTH_URL }}
        run: |
          set -euo pipefail
          HEALTH_URL="${ADMIN_HEALTH_URL:-https://ht.diaoyuus.cn/}"

          for i in $(seq 1 20); do
            if curl -fsS --max-time 8 "${HEALTH_URL}" >/tmp/admin-health.html; then
              if grep -Eqi '<div id="app"|<title' /tmp/admin-health.html; then
                echo "Admin site health check passed: ${HEALTH_URL}"
                head -c 500 /tmp/admin-health.html || true
                echo
                exit 0
              fi
            fi
            sleep 3
          done

          echo "Admin site health check failed: ${HEALTH_URL}"
          exit 1
